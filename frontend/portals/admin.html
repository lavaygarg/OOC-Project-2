<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hope Foundation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #fafbfc;
            color: #111827;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Top soft gradient glow */
        body::before {
            content: '';
            position: absolute;
            top: -150px; left: 50%;
            transform: translateX(-50%);
            width: 800px; height: 400px;
            background: radial-gradient(ellipse at center, rgba(46, 204, 113, 0.1) 0%, rgba(250, 251, 252, 0) 70%);
            pointer-events: none; z-index: 0;
        }

        /* Main Container */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 1;
            position: relative;
        }

        .login-board {
            background: white;
            border-radius: 12px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            max-width: 440px;
            width: 100%;
            border: 1px solid #e5e7eb;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: #111827;
            transform: translateX(-3px);
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: #e6f9f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-circle i {
            color: #047857;
            font-size: 1.6rem;
        }

        .login-board h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        .login-board p.subtitle {
            text-align: center;
            color: #4b5563;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute;
            left: 14px; top: 50%; transform: translateY(-50%);
            color: #9ca3af;
            transition: color 0.2s;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 40px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background: #fff;
            color: #111827;
        }

        .form-control::placeholder { color: #9ca3af; }

        .form-control:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .input-wrapper:focus-within i { color: #10b981; }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .security-note {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .security-note i { color: #10b981; }

        .twofa-panel {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #d1fae5;
            background: #f0fdf4;
        }

        .twofa-panel.active { display: block; }

        .twofa-panel h3 {
            font-size: 1rem;
            margin-bottom: 0.75rem;
            color: #065f46;
        }

        .twofa-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .twofa-qr {
            width: 180px;
            height: 180px;
            border-radius: 14px;
            background: white;
            border: 1px solid #d1d5db;
            padding: 10px;
            display: block;
            margin: 0.25rem auto;
        }

        .twofa-secret,
        .twofa-note {
            font-size: 0.85rem;
            color: #374151;
            word-break: break-all;
            background: rgba(255,255,255,0.75);
            border: 1px solid #dcfce7;
            border-radius: 10px;
            padding: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <main class="main-content">
        <div class="login-board">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portals</a>

            <div class="icon-circle">
                <i class="fas fa-user-shield"></i>
            </div>

            <h1>Admin Login</h1>
            <p class="subtitle">Access the admin dashboard</p>

            <form method="post" action="javascript:void(0);" onsubmit="handlePortalLogin(event)">
                <div class="form-group">
                    <label for="admin-user">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="admin-user" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="admin-pass">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="admin-pass" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>

            <form id="admin-2fa-form" class="twofa-panel" method="post" action="javascript:void(0);" onsubmit="handleAdminTwoFactorVerify(event)">
                <h3><i class="fas fa-shield-halved"></i> Two-Factor Verification</h3>
                <div id="admin-2fa-setup"></div>
                <div class="form-group">
                    <label for="admin-2fa-code">Verification Code</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="text" id="admin-2fa-code" class="form-control" placeholder="Enter 6-digit code" inputmode="numeric" autocomplete="one-time-code" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-lock"></i> Verify & Continue
                </button>
            </form>

            <p class="security-note">
                <i class="fas fa-shield-alt"></i> Secure admin access
            </p>
        </div>
    </main>

    <script>
        const API_BASE = ['localhost', '127.0.0.1', '0.0.0.0'].includes(window.location.hostname)
            ? 'http://localhost:3000/api'
            : 'https://ooc-backend.onrender.com/api';
        let pendingAdminTempToken = '';
        let adminCsrfToken = '';
        let adminCsrfInflight = null;

        async function getAdminCsrfToken(forceRefresh = false) {
            if (!forceRefresh && adminCsrfToken) return adminCsrfToken;
            if (!forceRefresh && adminCsrfInflight) return adminCsrfInflight;

            adminCsrfInflight = fetch(`${API_BASE}/csrf-token`, {
                method: 'GET',
                credentials: 'include'
            })
                .then(async (res) => {
                    const payload = await res.json().catch(() => ({}));
                    if (!res.ok || !payload?.csrfToken) {
                        throw new Error(payload?.error || 'Failed to fetch CSRF token');
                    }
                    adminCsrfToken = payload.csrfToken;
                    return adminCsrfToken;
                })
                .finally(() => {
                    adminCsrfInflight = null;
                });

            return adminCsrfInflight;
        }

        async function adminApiRequest(endpoint, options = {}) {
            const method = String(options.method || 'GET').toUpperCase();
            const headers = {
                'Content-Type': 'application/json',
                ...(options.headers || {})
            };

            if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
                headers['x-csrf-token'] = await getAdminCsrfToken();
            }

            let response = await fetch(`${API_BASE}/${endpoint}`, {
                ...options,
                method,
                headers,
                credentials: 'include'
            });

            if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method) && response.status === 403) {
                headers['x-csrf-token'] = await getAdminCsrfToken(true);
                response = await fetch(`${API_BASE}/${endpoint}`, {
                    ...options,
                    method,
                    headers,
                    credentials: 'include'
                });
            }

            return response;
        }

        // Clear any existing login state when visiting login page
        sessionStorage.removeItem('adminLoggedIn');
        localStorage.removeItem('adminLoggedIn');
        sessionStorage.removeItem('pendingAdmin2faToken');
        sessionStorage.removeItem('pendingAdmin2faEmail');
        sessionStorage.removeItem('pendingAdmin2faSetup');

        function resetAdminPortalState() {
            pendingAdminTempToken = '';

            const loginForm = document.querySelector('form[onsubmit="handlePortalLogin(event)"]');
            if (loginForm) loginForm.reset();

            const twoFaForm = document.getElementById('admin-2fa-form');
            if (twoFaForm) {
                twoFaForm.classList.remove('active');
                twoFaForm.reset();
            }

            const setup = document.getElementById('admin-2fa-setup');
            if (setup) setup.innerHTML = '';
        }

        async function handlePortalLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-login');
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const res = await adminApiRequest('staff/login', {
                    method: 'POST',
                    body: JSON.stringify({ email: user, password: pass })
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    if (data.staff?.role !== 'admin') {
                        throw new Error('Unauthorized access. This portal is for Administrators only.');
                    }

                    if (data.requiresTwoFactor) {
                        pendingAdminTempToken = data.tempToken;
                        sessionStorage.setItem('pendingAdmin2faToken', data.tempToken);
                        sessionStorage.setItem('pendingAdmin2faEmail', data.staff.email);
                        showAdminTwoFactorSetup(data.twoFactor);
                        showAdminTwoFactorForm();
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                        return;
                    }
                    
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('staffRole', data.staff.role);
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> Success!';
                    btn.style.background = '#059669';
                    
                    setTimeout(() => {
                        window.location.href = '../index.html#admin-dashboard';
                    }, 800);
                } else {
                    const error = await res.json();
                    throw new Error(error.error || error.message || 'Invalid credentials');
                }
            } catch (err) {
                alert(err.message || 'Login failed. Please check your credentials.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
            }
        }

        function showAdminTwoFactorSetup(twoFactor) {
            const setup = document.getElementById('admin-2fa-setup');
            if (!setup) return;

            if (!twoFactor?.secret) {
                setup.innerHTML = '<div class="twofa-note">Enter the verification code from your authenticator app to continue.</div>';
                return;
            }

            setup.innerHTML = `
                <div class="twofa-note"><strong>First-time setup:</strong> scan the QR code in your authenticator app, or add the secret manually.</div>
                ${twoFactor.qrCodeDataUrl ? `<img class="twofa-qr" src="${twoFactor.qrCodeDataUrl}" alt="Admin 2FA QR code">` : ''}
                <div class="twofa-secret"><strong>Secret:</strong> ${twoFactor.secret}</div>
                ${twoFactor.otpauthUrl ? `<div class="twofa-note"><strong>Manual entry URI:</strong> ${twoFactor.otpauthUrl}</div>` : ''}
            `;
        }

        function showAdminTwoFactorForm() {
            const panel = document.getElementById('admin-2fa-form');
            if (panel) panel.classList.add('active');
        }

        async function handleAdminTwoFactorVerify(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-login');
            const code = document.getElementById('admin-2fa-code').value.trim();
            const tempToken = pendingAdminTempToken || sessionStorage.getItem('pendingAdmin2faToken');

            if (!tempToken) {
                alert('Please sign in again to continue.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                const res = await adminApiRequest('staff/verify-2fa', {
                    method: 'POST',
                    body: JSON.stringify({ tempToken, code })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Verification failed');
                }

                sessionStorage.removeItem('pendingAdmin2faToken');
                sessionStorage.removeItem('pendingAdmin2faEmail');
                sessionStorage.removeItem('pendingAdmin2faSetup');
                pendingAdminTempToken = '';

                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('staffRole', data.staff.role);

                if (data.securityAlert) {
                    alert(data.securityAlert);
                }

                btn.innerHTML = '<i class="fas fa-check"></i> Success!';
                btn.style.background = '#059669';

                setTimeout(() => {
                    window.location.href = '../index.html#admin-dashboard';
                }, 800);
            } catch (err) {
                alert(err.message || 'Verification failed.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Verify & Continue';
            }
        }

        resetAdminPortalState();
    </script>
</body>
</html>
