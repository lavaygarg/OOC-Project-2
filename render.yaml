# Render Blueprint - Deploy both frontend and backend
# https://render.com/docs/blueprint-spec

services:
  # =====================
  # BACKEND API SERVICE
  # =====================
  - type: web
    name: ooc-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free  # Change to 'starter' or higher for paid plans
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RAZORPAY_KEY_ID
        sync: false  # Set manually in Render Dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false  # Set manually in Render Dashboard
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false  # Optional - Set in Render Dashboard
      - key: FRONTEND_URL
        sync: false  # Set your frontend URL after deployment

  # =====================
  # FRONTEND STATIC SITE
  # =====================
  - type: web
    name: HopeFoundation
    runtime: static
    rootDir: frontend
    buildCommand: echo "No build step needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://ooc-backend.onrender.com https://hopefoundation.onrender.com https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /.well-known/security.txt
        destination: /.well-known/security.txt
      - type: rewrite
        source: /*
        destination: /index.html
